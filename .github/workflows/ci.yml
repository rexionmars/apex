name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Go core: vet and tests. The frontend dist is stubbed so the
  # //go:embed all:frontend/dist directive compiles without a full JS build.
  # ---------------------------------------------------------------------------
  go:
    name: Go core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Stub embedded frontend
        run: |
          mkdir -p frontend/dist
          echo '<!doctype html><title>ci</title>' > frontend/dist/index.html

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -count=1

  # ---------------------------------------------------------------------------
  # Full Wails build: generates the Go<->JS bindings (which are not versioned),
  # then type-checks and builds the frontend as part of the native build. This
  # validates the Go core, the bindings and the frontend together, exactly as a
  # release would. Needs GTK/WebKit on Linux.
  # ---------------------------------------------------------------------------
  build:
    name: Wails build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev
          sudo apt-get install -y libwebkit2gtk-4.0-dev || \
          sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build (generates bindings, type-checks and builds the frontend)
        run: wails build -platform linux/amd64 -clean

  # ---------------------------------------------------------------------------
  # Python sidecars: byte-compile (syntax) + ruff lint (non-blocking style).
  # ---------------------------------------------------------------------------
  python:
    name: Python sidecars
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Syntax check (byte-compile)
        run: python -m compileall -q sidecar

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check sidecar --output-format=github
